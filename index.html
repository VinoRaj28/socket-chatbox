<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Socket Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 500px; display: flex; flex-direction: column; gap: 16px; }
    .nickname-setup { background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #333; display: none; }
    .nickname-setup.active { display: flex; flex-direction: column; gap: 12px; }
    .nickname-setup input { background: #111; border: 1px solid #333; padding: 10px; color: #e0e0e0; border-radius: 6px; font-family: monospace; }
    .nickname-setup button { background: #7f77dd; border: none; padding: 10px; color: white; cursor: pointer; border-radius: 6px; }
    .nickname-setup button:hover { background: #534ab7; }
    .chat-box { width: 100%; border: 1px solid #333; border-radius: 12px; overflow: hidden; display: none; }
    .chat-box.active { display: flex; flex-direction: column; }
    .header { background: #1a1a2e; padding: 16px; font-size: 18px; color: #7f77dd; border-bottom: 1px solid #333; }
    .status { font-size: 12px; color: #888; margin-top: 4px; }
    .status.connected { color: #5dcaa5; }
    .messages { height: 380px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { padding: 10px 14px; border-radius: 8px; font-size: 14px; }
    .message.own { background: #2a3f5f; align-self: flex-end; max-width: 80%; }
    .message.other { background: #1e1e1e; }
    .message.system { background: #1a2a1a; color: #5dcaa5; font-size: 12px; align-self: center; }
    .message .name { color: #5dcaa5; font-weight: bold; margin-right: 8px; }
    .message.own .name { color: #7f77dd; }
    .message-time { font-size: 11px; color: #666; margin-top: 4px; }
    .input-area { display: flex; border-top: 1px solid #333; }
    input { flex: 1; background: #111; border: none; padding: 14px; color: #e0e0e0; font-size: 14px; outline: none; font-family: monospace; }
    button { background: #7f77dd; border: none; padding: 14px 20px; color: white; cursor: pointer; font-size: 14px; }
    button:hover { background: #534ab7; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="nickname-setup active" id="nicknameSetup">
      <label style="color: #7f77dd;">Choose a Nickname:</label>
      <input type="text" id="nicknameInput" placeholder="Enter your nickname..." />
      <button onclick="connectToChat()">Join Chat</button>
    </div>
    
    <div class="chat-box" id="chatBox">
      <div class="header">
        🔒 Socket Chat
        <div class="status" id="status">Connecting...</div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input type="text" id="msg" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()"/>
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let currentNickname = null;

    function connectToChat() {
      const nicknameInput = document.getElementById('nicknameInput');
      const nickname = nicknameInput.value.trim();
      
      if (!nickname) {
        alert('Please enter a nickname');
        return;
      }

      currentNickname = nickname;
      
      // Connect to WebSocket server
      ws = new WebSocket('ws://localhost:8765');
      
      ws.onopen = function(event) {
        console.log('Connected to server');
        document.getElementById('status').textContent = 'Connected';
        document.getElementById('status').classList.add('connected');
        
        // Send nickname to server
        ws.send(JSON.stringify({ nickname: nickname }));
        
        // Hide nickname setup and show chat
        document.getElementById('nicknameSetup').classList.remove('active');
        document.getElementById('chatBox').classList.add('active');
      };
      
      ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        displayMessage(data);
      };
      
      ws.onerror = function(event) {
        console.error('WebSocket error:', event);
        document.getElementById('status').textContent = 'Error';
        document.getElementById('status').classList.remove('connected');
      };
      
      ws.onclose = function(event) {
        console.log('Disconnected from server');
        document.getElementById('status').textContent = 'Disconnected';
        document.getElementById('status').classList.remove('connected');
      };
    }

    function sendMsg() {
      const input = document.getElementById('msg');
      const message = input.value.trim();
      
      if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }
      
      ws.send(JSON.stringify({ message: message }));
      input.value = '';
      input.focus();
    }

    function displayMessage(data) {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      
      if (data.type === 'system') {
        messageEl.className = 'message system';
        messageEl.textContent = data.message;
      } else if (data.type === 'message') {
        const isOwn = data.nickname === currentNickname;
        messageEl.className = `message ${isOwn ? 'own' : 'other'}`;
        messageEl.innerHTML = `<span class="name">${data.nickname}:</span>${data.message}<div class="message-time">${new Date(data.timestamp).toLocaleTimeString()}</div>`;
      }
      
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
